<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PropertyHost - Reports</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <div class="logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="phGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#38BDF8"/>
                                <stop offset="1" stop-color="#0284C7"/>
                            </linearGradient>
                        </defs>
                        <rect width="34" height="34" rx="9" fill="url(#phGrad)"/>
                        <path d="M9 16 L17 9 L25 16" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M11.5 15v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-9" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <rect x="15.2" y="19.5" width="3.6" height="5.5" rx="0.5" fill="white"/>
                    </svg>
                </div>
                <h1>PropertyHost</h1>
            </div>

            <nav>
                <a href="index.html" data-page="index">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="properties.html" data-page="properties">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-6h6v6"/></svg>
                    <span>Properties</span>
                </a>
                <a href="finance.html" data-page="finance">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <span>Finance</span>
                </a>
                <a href="maintenance.html" data-page="maintenance">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span>Maintenance</span>
                </a>
                <a href="reports.html" data-page="reports" class="active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    <span>Reports</span>
                </a>
                <a href="settings.html" data-page="settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Settings</span>
                </a>
            </nav>

        </aside>

        <main>

            <div class="page-header">
                <div>
                    <h2>Reports</h2>
                    <p>Resumen consolidado de todas tus propiedades.</p>
                </div>
                <button class="filter-btn active" id="export-btn">⬇ Exportar / Imprimir</button>
            </div>

            <section class="finance-summary" id="report-summary">
                <div class="card">
                    <h3>Total Revenue</h3>
                    <span id="report-revenue">—</span>
                </div>
                <div class="card">
                    <h3>Total Expenses</h3>
                    <span id="report-expenses">—</span>
                </div>
                <div class="card">
                    <h3>Net Profit</h3>
                    <span id="report-profit">—</span>
                </div>
            </section>

            <section class="dashboard-grid">
                <div class="panel chart-panel">
                    <div class="panel-head">
                        <h3>Revenue Trend & Forecast</h3>
                        <div class="legend">
                            <span><span class="dot actual"></span>Actual</span>
                            <span><span class="dot forecast"></span>Projected</span>
                        </div>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="report-revenue-chart"></canvas>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-head">
                        <h3>Expenses by Category</h3>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="report-expense-donut"></canvas>
                    </div>
                </div>
            </section>

            <h2 class="section-title">Performance by Property</h2>

            <div class="panel">
                <div class="chart-wrap" style="height:320px;">
                    <canvas id="report-property-chart"></canvas>
                </div>
            </div>

        </main>

    </div>

    <script src="js/api.js" defer></script>
    <script src="js/charts.js" defer></script>
    <script src="js/reports.js" defer></script>

</body>

</html>
